<!DOCTYPE html>
<html lang="es">
<head>
<script>
/* ===== AI APPs · Folder Bridge (guardado en carpeta local) ===== */
(function(){
  const APP_ID = "bitacora-mentor";
  const SYNC_PREFIX = "ledger-data";
  // La caché real ahora se guarda como "ledger-data::<userId>" (aislada por usuario),
  // así que este puente reconoce cualquier clave con ese prefijo, no solo la exacta.
  function isSyncKey(k){ return k === SYNC_PREFIX || k.indexOf(SYNC_PREFIX + '::') === 0; }
  const DB_NAME = "aiapps-folder-bridge";
  const STORE = "handles";

  function idbOpen(){
    return new Promise((res, rej)=>{
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(STORE);
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  async function idbGet(key){
    const db = await idbOpen();
    return new Promise((res, rej)=>{
      const rq = db.transaction(STORE, "readonly").objectStore(STORE).get(key);
      rq.onsuccess = () => res(rq.result);
      rq.onerror = () => rej(rq.error);
    });
  }
  async function idbSet(key, val){
    const db = await idbOpen();
    return new Promise((res, rej)=>{
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(val, key);
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error);
    });
  }

  const supported = 'showDirectoryPicker' in window;
  let dirHandle = null;
  let writeTimer = null;
  let badgeEl = null;
  const FILE_NAME = APP_ID + ".data.json";

  async function readFolderFile(){
    if(!dirHandle) return null;
    try{
      const fh = await dirHandle.getFileHandle(FILE_NAME, {create:false});
      const file = await fh.getFile();
      const text = await file.text();
      return text ? JSON.parse(text) : null;
    }catch(e){ return null; }
  }

  async function writeFolderFile(data){
    if(!dirHandle) return;
    try{
      const fh = await dirHandle.getFileHandle(FILE_NAME, {create:true});
      const writable = await fh.createWritable();
      await writable.write(JSON.stringify(data, null, 2));
      await writable.close();
    }catch(e){ console.warn("[AI APPs] No se pudo escribir en la carpeta:", e); }
  }

  function collectLocalSnapshot(){
    const out = {};
    Object.keys(localStorage).forEach(k => { if(isSyncKey(k)){ const v = localStorage.getItem(k); if(v !== null) out[k] = v; } });
    return out;
  }

  function applySnapshot(snap){
    if(!snap) return;
    Object.keys(snap).forEach(k => { if(isSyncKey(k)) localStorage.setItem.__original.call(localStorage, k, snap[k]); });
  }

  function queueWrite(){
    clearTimeout(writeTimer);
    writeTimer = setTimeout(()=>{ writeFolderFile(collectLocalSnapshot()); }, 700);
  }

  // Interceptar localStorage.setItem para reflejar cada cambio en el archivo de la carpeta
  const origSetItem = localStorage.setItem.bind(localStorage);
  function patchedSetItem(key, value){
    origSetItem(key, value);
    if(isSyncKey(key)) queueWrite();
  }
  patchedSetItem.__original = origSetItem;
  localStorage.setItem = patchedSetItem;

  function makeBadge(){
    const el = document.createElement('div');
    el.id = 'aiapps-folder-badge';
    el.style.cssText = 'position:fixed;bottom:14px;right:14px;z-index:999999;font-family:system-ui,-apple-system,sans-serif;font-size:12.5px;line-height:1;display:inline-flex;align-items:center;gap:7px;background:#1B2430;color:#F1EDE4;padding:9px 14px;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.12);user-select:none;';
    document.body.appendChild(el);
    return el;
  }

  function setBadge(state){
    if(!badgeEl) return;
    if(state === 'connected'){
      badgeEl.textContent = '📁 Guardando en carpeta local';
      badgeEl.style.opacity = '0.72';
      badgeEl.style.cursor = 'default';
      badgeEl.title = 'Los datos se están guardando en ' + FILE_NAME + ' dentro de tu carpeta AI APPs';
      badgeEl.onclick = null;
    } else if(state === 'reconnect'){
      badgeEl.textContent = '📁 Reconectar carpeta de datos';
      badgeEl.style.opacity = '1';
      badgeEl.style.cursor = 'pointer';
      badgeEl.onclick = connect;
    } else if(state === 'unsupported'){
      badgeEl.textContent = '⚠️ Guardado solo local (usa Chrome/Edge)';
      badgeEl.style.opacity = '0.6';
      badgeEl.style.cursor = 'default';
      badgeEl.onclick = null;
    } else {
      badgeEl.textContent = '📁 Conectar carpeta de datos';
      badgeEl.style.opacity = '1';
      badgeEl.style.cursor = 'pointer';
      badgeEl.onclick = connect;
    }
  }

  async function connect(){
    try{
      const handle = await window.showDirectoryPicker({ id: 'aiapps-folder', mode: 'readwrite' });
      const perm = await handle.requestPermission({ mode: 'readwrite' });
      if(perm !== 'granted') throw new Error('permiso denegado');
      dirHandle = handle;
      await idbSet(APP_ID + '-dir', handle);
      const existing = await readFolderFile();
      if(existing){
        applySnapshot(existing);
        setBadge('connected');
        location.reload();
        return;
      }
      await writeFolderFile(collectLocalSnapshot());
      setBadge('connected');
    }catch(e){
      console.warn('[AI APPs] Conexión de carpeta cancelada:', e);
    }
  }

  async function tryReconnect(){
    try{
      const handle = await idbGet(APP_ID + '-dir');
      if(!handle){ setBadge('idle'); return; }
      const perm = await handle.queryPermission({ mode: 'readwrite' });
      if(perm === 'granted'){
        dirHandle = handle;
        const existing = await readFolderFile();
        if(existing){
          const localSnap = JSON.stringify(collectLocalSnapshot());
          const fileSnap = JSON.stringify(existing);
          if(localSnap !== fileSnap){
            applySnapshot(existing);
            setBadge('connected');
            location.reload();
            return;
          }
        }
        setBadge('connected');
      } else {
        setBadge('reconnect');
      }
    }catch(e){
      setBadge('idle');
    }
  }

  window.addEventListener('DOMContentLoaded', async () => {
    badgeEl = makeBadge();
    if(!supported){ setBadge('unsupported'); return; }
    setBadge('idle');
    await tryReconnect();
  });
})();
</script>

<script>
const ENFOQUES = {

let state = { mentees: [], sessions: [] };

let modal = null;
let editingSessionId = null;
let editingMenteeId = null;

let currentTab = 'mentoria';

const STORAGE_KEY = 'ledger-data';
const SUPA_APP_ID = 'bitacora-mentor';
const hasClaudeStorage = typeof window.storage !== 'undefined' && window.storage !== null;
// Evita que un guardado disparado antes de que termine la carga inicial
// sobrescriba la nube con un estado vacío/desactualizado.
let cloudSyncReady = false;

async function getSupabaseSession(){
  if(!window.supabaseClient) return null;
  const { data } = await window.supabaseClient.auth.getSession();
  return data && data.session ? data.session : null;
}

// Aísla la caché local por usuario, para que la cuenta de una persona nunca
// herede la caché de otra que haya usado el mismo navegador/equipo.
function scopedKey(key, userId){
  return userId ? `${key}::${userId}` : key;
}

// Migración de una sola vez: si existen datos guardados con la clave vieja
// (de antes de aislar por usuario) y la clave nueva todavía no tiene nada,
// los copia — para que ese dato no quede huérfano e inaccesible para siempre.
function migrateLegacyCache(baseKey, scoped){
  if(scoped === baseKey) return;
  if(localStorage.getItem(scoped) !== null) return;
  const legacy = localStorage.getItem(baseKey);
  if(legacy !== null) localStorage.setItem(scoped, legacy);
}

const storageAdapter = {
  async get(key){
    const session = await getSupabaseSession();
    if(session){
      const localKey = scopedKey(key, session.user.id);
      migrateLegacyCache(key, localKey);
      try{
        const { data, error } = await window.supabaseClient
          .from('app_data')
          .select('data')
          .eq('app_id', SUPA_APP_ID)
          .eq('user_id', session.user.id)
          .maybeSingle();
        if(error) throw error;
        if(data && data.data){
          const value = JSON.stringify(data.data);
          localStorage.setItem(localKey, value);
          return { key, value };
        }
        // No hay fila en la nube todavía (cuenta nueva) - usar caché local si existe,
        // para no confundir "sin datos en la nube" con "borrar mis datos locales".
        const raw = localStorage.getItem(localKey);
        return raw ? { key, value: raw } : null;
      }catch(e){
        console.warn('[Bitácora] No se pudo leer de la nube, usando caché local:', e);
        const raw = localStorage.getItem(localKey);
        return raw ? { key, value: raw } : null;
      }
    }
    if(hasClaudeStorage) return await window.storage.get(key);
    // Sin sesión confirmada: no cargar datos reales en memoria/DOM, aunque
    // existan en caché local de una sesión anterior (el candado solo tapa
    // visualmente, no debe haber datos reales detrás mientras no hay sesión).
    return null;
  },
  async set(key, value){
    const session = await getSupabaseSession();
    if(session){
      localStorage.setItem(scopedKey(key, session.user.id), value);
      if(!cloudSyncReady){
        // Todavía no terminó la carga inicial - no subir a la nube para no
        // pisar datos reales con un estado vacío/desactualizado.
        return { key, value };
      }
      try{
        const { error } = await window.supabaseClient
          .from('app_data')
          .upsert(
            { user_id: session.user.id, app_id: SUPA_APP_ID, data: JSON.parse(value), updated_at: new Date().toISOString() },
            { onConflict: 'user_id,app_id' }
          );
        if(error) throw error;
      }catch(e){
        console.warn('[Bitácora] Guardado local OK, pero falló la sincronización con la nube:', e);
      }
      return { key, value };
    }
    if(hasClaudeStorage) return await window.storage.set(key, value);
    localStorage.setItem(key, value);
    return { key, value };
  }
};

async function loadData(){
  try{
    const res = await storageAdapter.get(STORAGE_KEY);
    if(res && res.value) state = JSON.parse(res.value);
  }catch(e){
    state = { mentees: [], sessions: [] };
  }
  if(!state.mentees) state.mentees = [];
  if(!state.sessions) state.sessions = [];
  if(!state.groups) state.groups = [];
  if(!state.groupSessions) state.groupSessions = [];
  if(!state.templates) state.templates = [];
  if(state.mentees.length && !selectedMenteeId) selectedMenteeId = state.mentees[0].id;
  if(state.groups.length && !selectedGroupId) selectedGroupId = state.groups[0].id;
  cloudSyncReady = true;
  render();
}

async function saveData(){
  try{
    await storageAdapter.set(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    showToast('No se pudo guardar. Intenta de nuevo.');
  }
}

function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

function showUndoToast(message, undoFn){
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span>${esc(message)}</span>`;
  const btn = document.createElement('button');
  btn.textContent = 'Deshacer';
  btn.style.cssText = 'margin-left:8px;background:none;border:1px solid rgba(255,255,255,0.45);color:var(--surface);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:Inter,sans-serif;';
  t.appendChild(btn);
  document.body.appendChild(t);
  const timer = setTimeout(()=>t.remove(), 6000);
  btn.onclick = async ()=>{
    clearTimeout(timer);
    t.remove();
    await undoFn();
  };
}

}

function esc(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : s;
  return d.innerHTML;
}

function expandableField(label, text, fieldId){
  if(!text) return '';
  const isLong = text.length > 240;
  return `<div style="grid-column:1 / -1;">

    <p class="profile-field-value${isLong ? ' clamped' : ''}" id="field-${fieldId}">${esc(text)}</p>
    ${isLong ? `<button class="read-more-btn" data-target="field-${fieldId}">leer más</button>` : ''}
  </div>`;
}

}

function sessionCount(menteeId){
  return state.sessions.filter(s=>s.menteeId===menteeId).length;
}

function pendingCommitments(menteeId){
  return state.sessions.filter(s=>s.menteeId===menteeId && s.commitment && !s.commitmentDone).length;
}

function daysSinceLastActivity(mentee){
  const sessions = state.sessions.filter(s=>s.menteeId===mentee.id);
  let lastDateStr = sessions.length ? sessions.map(s=>s.date).sort().slice(-1)[0] : mentee.createdAt.slice(0,10);
  const last = new Date(lastDateStr + 'T00:00:00');
  const now = new Date();
  return Math.floor((now - last) / (1000*60*60*24));
}

function isInactive(mentee){
  if(mentee.status !== 'activo' || mentee.type !== 'continuo') return false;
  return daysSinceLastActivity(mentee) > INACTIVITY_DAYS;
}

function pendingGroupCommitments(groupId){
  return state.groupSessions.filter(s=>s.groupId===groupId && s.commitment && !s.commitmentDone).length;
}

function daysSinceLastGroupActivity(group){
  const sessions = state.groupSessions.filter(s=>s.groupId===group.id);
  let lastDateStr = sessions.length ? sessions.map(s=>s.date).sort().slice(-1)[0] : group.createdAt.slice(0,10);
  const last = new Date(lastDateStr + 'T00:00:00');
  const now = new Date();
  return Math.floor((now - last) / (1000*60*60*24));
}

function isGroupInactive(group){
  return daysSinceLastGroupActivity(group) > INACTIVITY_DAYS;
}

function deleteGroup(id){
  const group = state.groups.find(g=>g.id===id);
  if(!group) return;
  askConfirm(`¿Eliminar el grupo "${group.name}" y todo su historial de sesiones grupales?`, ()=> performDeleteGroup(id));
}

async function performDeleteGroup(id){
  const group = state.groups.find(g=>g.id===id);
  if(!group) return;
  const relatedSessions = state.groupSessions.filter(s=>s.groupId===id);
  state.groups = state.groups.filter(g=>g.id!==id);
  state.groupSessions = state.groupSessions.filter(s=>s.groupId!==id);
  if(selectedGroupId === id) selectedGroupId = state.groups[0]?.id || null;
  await saveData();
  render();
  showUndoToast(`Grupo "${group.name}" eliminado.`, async ()=>{
    state.groups.push(group);
    state.groupSessions.push(...relatedSessions);
    selectedGroupId = group.id;
    await saveData();
    render();
  });
}

function deleteGroupSession(id){
  askConfirm('¿Eliminar esta sesión grupal? Podrás deshacerlo por unos segundos.', ()=> performDeleteGroupSession(id));
}

async function performDeleteGroupSession(id){
  const session = state.groupSessions.find(s=>s.id===id);
  if(!session) return;
  state.groupSessions = state.groupSessions.filter(s=>s.id!==id);
  await saveData();
  render();
  showUndoToast('Sesión grupal eliminada.', async ()=>{
    state.groupSessions.push(session);
    await saveData();
    render();
  });
}

function renderDbTable(){
  const tbody = document.getElementById('db-tbody');
  const countEl = document.getElementById('db-count');
  if(!tbody) return;
  const qn = dbFilters.name.trim().toLowerCase();
  const qa = dbFilters.area.trim().toLowerCase();
  let rows = state.mentees.filter(m=>
    (!qn || m.name.toLowerCase().includes(qn)) &&
    (!qa || m.area.toLowerCase().includes(qa)) &&
    (!dbFilters.country || m.country === dbFilters.country) &&
    (!dbFilters.nivel || m.level === dbFilters.nivel) &&
    (!dbFilters.tipo || m.type === dbFilters.tipo) &&
    (!dbFilters.estado || (m.status||'activo') === dbFilters.estado)
  );
  rows.sort((a,b)=>{
    let av, bv;
    if(dbSort.col === 'sessions'){ av = sessionCount(a.id); bv = sessionCount(b.id); }
    else if(dbSort.col === 'pending'){ av = pendingCommitments(a.id); bv = pendingCommitments(b.id); }
    else if(dbSort.col === 'type'){ av = a.type||''; bv = b.type||''; }
    else if(dbSort.col === 'status'){ av = a.status||'activo'; bv = b.status||'activo'; }
    else { av = (a[dbSort.col]||'').toString().toLowerCase(); bv = (b[dbSort.col]||'').toString().toLowerCase(); }
    if(av < bv) return dbSort.dir==='asc' ? -1 : 1;
    if(av > bv) return dbSort.dir==='asc' ? 1 : -1;
    return 0;
  });
  countEl.textContent = `${rows.length} mentee${rows.length===1?'':'s'} encontrados`;
  if(!rows.length){
    tbody.innerHTML = `<tr><td colspan="10" style="color:var(--muted);text-align:center;padding:24px;">Sin resultados con estos filtros.</td></tr>`;
    document.getElementById('db-pagination').innerHTML = '';
    return;
  }
  const totalPages = Math.max(1, Math.ceil(rows.length / DB_PAGE_SIZE));
  if(dbPage > totalPages) dbPage = totalPages;
  if(dbPage < 1) dbPage = 1;
  const pageRows = rows.slice((dbPage-1)*DB_PAGE_SIZE, dbPage*DB_PAGE_SIZE);

  tbody.innerHTML = '';
  pageRows.forEach(m=>{
    const status = m.status || 'activo';
    const pend = pendingCommitments(m.id);
    const tr = document.createElement('tr');
    tr.className = 'clickable';
    tr.innerHTML = `
      <td>${esc(m.name)}</td>
      <td>${esc(m.area)}</td>
      <td>${esc(m.country) || '—'}</td>
      <td>${esc(m.level)}</td>
      <td>${m.type==='puntual' ? 'Puntual' : 'Continuo'}</td>
      <td><span class="mini-status ${status}">${ESTADOS[status]}</span></td>
      <td>${esc(m.phone) || '—'}</td>
      <td>${esc(m.email) || '—'}</td>
      <td>${sessionCount(m.id)}</td>
      <td>${pend || '—'}</td>
    `;
    tr.onclick = ()=>{ selectedMenteeId = m.id; currentTab = 'mentoria'; render(); };
    tbody.appendChild(tr);
  });

  const pag = document.getElementById('db-pagination');
  if(totalPages <= 1){
    pag.innerHTML = '';
  }else{
    pag.innerHTML = `
      <button id="db-prev" ${dbPage<=1?'disabled':''}>‹ Anterior</button>
      <span class="page-indicator">Página ${dbPage} de ${totalPages}</span>
      <button id="db-next" ${dbPage>=totalPages?'disabled':''}>Siguiente ›</button>
    `;
    const prevBtn = document.getElementById('db-prev');
    const nextBtn = document.getElementById('db-next');
    if(prevBtn) prevBtn.onclick = ()=>{ dbPage--; renderDbTable(); };
    if(nextBtn) nextBtn.onclick = ()=>{ dbPage++; renderDbTable(); };
  }
}

      const id = card.dataset.id;
      card.querySelector('[data-action="edit"]').onclick = ()=>{ editingTemplateId=id; modal='template'; render(); renderModal(); };
      card.querySelector('[data-action="delete"]').onclick = ()=>{
        askConfirm('¿Eliminar esta plantilla? Las sesiones que ya la usaron conservan su checklist.', async ()=>{
          state.templates = state.templates.filter(x=>x.id!==id);
          await saveData();
          render();
        });
      };
    });
  }
  if(modal) renderModal();
}

function renderReportsView(body){
  const totalPersonas = state.mentees.length;
  const totalSesionesIndividuales = state.sessions.length;
  const totalSesionesGrupales = state.groupSessions.length;
  const totalSesiones = totalSesionesIndividuales + totalSesionesGrupales;
  const finalSesiones = state.sessions.filter(s=>s.status!=='draft').length + state.groupSessions.filter(s=>s.status!=='draft').length;
  const draftSesiones = totalSesiones - finalSesiones;
  const totalGrupos = state.groups.length;

  const porTipo = { continuo: 0, puntual: 0 };
  state.mentees.forEach(m=>{ porTipo[m.type==='puntual'?'puntual':'continuo']++; });

  const porNivel = {};
  NIVELES.forEach(n=> porNivel[n] = 0);
  state.mentees.forEach(m=>{ if(porNivel[m.level] !== undefined) porNivel[m.level]++; });

  const porEnfoque = { directivo:0, socratico:0, colaborativo:0 };
  state.sessions.forEach(s=>{ if(porEnfoque[s.approach] !== undefined) porEnfoque[s.approach]++; });
  state.groupSessions.forEach(s=>{ if(porEnfoque[s.approach] !== undefined) porEnfoque[s.approach]++; });

  const porEstado = { activo:0, pausa:0, cerrado:0 };
  state.mentees.forEach(m=>{ const st = m.status||'activo'; if(porEstado[st] !== undefined) porEstado[st]++; });

  const porArea = {};
  state.mentees.forEach(m=>{ const key = m.area || 'Sin especificar'; porArea[key] = (porArea[key]||0)+1; });
  const areaEntries = Object.entries(porArea).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const cerrados = state.mentees.filter(m=> (m.status||'activo') === 'cerrado');
  const logrados = cerrados.filter(m=>m.outcome==='logrado').length;
  const parciales = cerrados.filter(m=>m.outcome==='parcial').length;
  const noLogrados = cerrados.filter(m=>m.outcome==='no_logrado').length;
  const tasaLogro = cerrados.length ? Math.round((logrados/cerrados.length)*100) : 0;

  const maxTipo = Math.max(porTipo.continuo, porTipo.puntual, 1);
  const maxNivel = Math.max(...Object.values(porNivel), 1);
  const maxEnfoque = Math.max(...Object.values(porEnfoque), 1);
  const maxEstado = Math.max(...Object.values(porEstado), 1);
  const maxArea = Math.max(...areaEntries.map(e=>e[1]), 1);
  const maxResultado = Math.max(logrados, parciales, noLogrados, 1);

  body.innerHTML = `
    <div class="rep-wrap">
      <div class="rep-grid">
        <div class="metric-card">
          <p class="metric-label">Personas ayudadas en total</p>
          <p class="metric-value">${totalPersonas}</p>
        </div>
        <div class="metric-card">
          <p class="metric-label">Mentorías registradas en total</p>
          <p class="metric-value">${totalSesiones}</p>
          <p class="metric-sub">${totalSesionesIndividuales} individuales · ${totalSesionesGrupales} grupales · ${draftSesiones} borradores</p>
        </div>
        <div class="metric-card">
          <p class="metric-label">Grupos de mentoría</p>
          <p class="metric-value">${totalGrupos}</p>
          <p class="metric-sub">${totalSesionesGrupales} sesión${totalSesionesGrupales===1?'':'es'} grupal${totalSesionesGrupales===1?'':'es'} registrada${totalSesionesGrupales===1?'':'s'}</p>
        </div>
        <div class="metric-card">
          <p class="metric-label">Tasa de objetivos logrados</p>
          <p class="metric-value">${tasaLogro}%</p>
          <p class="metric-sub">de ${cerrados.length} mentoría${cerrados.length===1?'':'s'} cerrada${cerrados.length===1?'':'s'}</p>
        </div>
        <div class="metric-card">
          <p class="metric-label">Mentees activos ahora</p>
          <p class="metric-value">${porEstado.activo}</p>
        </div>
      </div>

      <div class="rep-section">
        <h4>Mentees por estado</h4>
        ${barRow('Activo', porEstado.activo, maxEstado, 'var(--status-activo)')}
        ${barRow('En pausa', porEstado.pausa, maxEstado, 'var(--status-pausa)')}
        ${barRow('Cerrado', porEstado.cerrado, maxEstado, 'var(--status-cerrado)')}
      </div>

      <div class="rep-section">
        <h4>Resultados de mentorías cerradas</h4>
        ${cerrados.length ? `
          ${barRow('Objetivo logrado', logrados, maxResultado, 'var(--status-activo)')}
          ${barRow('Logrado parcialmente', parciales, maxResultado, 'var(--status-pausa)')}
          ${barRow('No logrado', noLogrados, maxResultado, 'var(--rust)')}
        ` : `<p style="font-size:12.5px;color:var(--muted);margin:0;">Aún no tienes mentorías marcadas como cerradas.</p>`}
      </div>

      <div class="rep-section">
        <h4>Por área</h4>
        ${areaEntries.map(([label,val])=> barRow(label, val, maxArea, 'var(--brass)')).join('')}
      </div>

      <div class="rep-section">
        <h4>Por tipo de mentoría</h4>
        ${barRow('Seguimiento continuo', porTipo.continuo, maxTipo, 'var(--sage)')}
        ${barRow('Consulta puntual (1-2 sesiones)', porTipo.puntual, maxTipo, 'var(--brass)')}
      </div>

      <div class="rep-section">
        <h4>Mentees por nivel</h4>
        ${NIVELES.map(n=> barRow(n, porNivel[n], maxNivel, 'var(--slate)')).join('')}
      </div>

      <div class="rep-section">
        <h4>Sesiones por enfoque usado</h4>
        ${barRow('Directivo', porEnfoque.directivo, maxEnfoque, ENFOQUES.directivo.color)}
        ${barRow('Socrático', porEnfoque.socratico, maxEnfoque, ENFOQUES.socratico.color)}
        ${barRow('Colaborativo', porEnfoque.colaborativo, maxEnfoque, ENFOQUES.colaborativo.color)}
      </div>
    </div>
  `;
}

function barRow(label, value, max, color){
  const pct = Math.round((value/max)*100);
  return `
    <div class="bar-row">
      <div class="bar-label"><span>${esc(label)}</span><span>${value}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
    </div>
  `;
}

function renderModal(){
  const existing = document.querySelector('.overlay');
  if(existing) existing.remove();
  if(!modal) return;

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.onclick = (e)=>{ if(e.target === overlay){ modal=null; editingSessionId=null; editingMenteeId=null; editingGroupId=null; editingGroupSessionId=null; editingTemplateId=null; confirmContext=null; renderModal(); } };

  if(modal === 'confirm' && confirmContext){
    overlay.innerHTML = `
      <div class="modal" style="max-width:360px;">
        <h3>Confirmar</h3>
        <p style="font-size:13.5px;color:var(--ink);margin:0 0 20px;">${esc(confirmContext.message)}</p>
        <div class="modal-actions">
          <button class="btn-ghost" id="btn-confirm-cancel">Cancelar</button>
          <button class="btn-danger" id="btn-confirm-ok">Eliminar</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('btn-confirm-cancel').onclick = ()=>{ modal=null; confirmContext=null; renderModal(); };
    document.getElementById('btn-confirm-ok').onclick = async ()=>{
      const cb = confirmContext.onConfirm;
      modal = null; confirmContext = null;
      await cb();
      renderModal();
    };
    return;
  }

  if(modal === 'group'){
    const existingGroup = editingGroupId ? state.groups.find(g=>g.id===editingGroupId) : null;
    const memberIds = existingGroup ? (existingGroup.memberIds||[]) : [];
    const sortedMentees = state.mentees.slice().sort((a,b)=>a.name.localeCompare(b.name));
    overlay.innerHTML = `
      <div class="modal">
        <h3>${existingGroup ? 'Editar grupo' : 'Nuevo grupo de mentoría'}</h3>
        <div class="field"><label>Nombre del grupo</label><input id="g-name" placeholder="Ej: Cohorte búsqueda de empleo - julio" value="${existingGroup ? esc(existingGroup.name) : ''}"></div>
        <div class="field"><label>Descripción <span style="color:var(--muted);">(opcional)</span></label><textarea id="g-desc" placeholder="Contexto del grupo">${existingGroup ? esc(existingGroup.description||'') : ''}</textarea></div>
        <div class="field"><label>Integrantes</label>
          <div class="member-checklist" id="member-checklist">
            ${sortedMentees.length ? sortedMentees.map(m=>`
              <label class="member-check-row">
                <input type="checkbox" value="${m.id}" ${memberIds.includes(m.id)?'checked':''}>
                <span>${esc(m.name)}</span>
              </label>
            `).join('') : '<p class="member-empty">Primero agrega mentees en la pestaña "Mentoría" para poder incluirlos aquí.</p>'}
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-ghost" id="btn-cancel">Cancelar</button>
          <button class="btn-primary" id="btn-save">${existingGroup ? 'Guardar cambios' : 'Crear grupo'}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('btn-cancel').onclick = ()=>{ modal=null; editingGroupId=null; renderModal(); };
    document.getElementById('btn-save').onclick = async ()=>{
      const name = document.getElementById('g-name').value.trim();
      if(!name){ showToast('Ponle un nombre al grupo.'); return; }
      const checked = Array.from(overlay.querySelectorAll('#member-checklist input:checked')).map(el=>el.value);
      const groupData = {
        id: existingGroup ? existingGroup.id : uid(),
        name,
        description: document.getElementById('g-desc').value.trim(),
        memberIds: checked,
        createdAt: existingGroup ? existingGroup.createdAt : new Date().toISOString()
      };
      if(existingGroup){
        const idx = state.groups.findIndex(g=>g.id===existingGroup.id);
        state.groups[idx] = groupData;
      }else{
        state.groups.push(groupData);
        selectedGroupId = groupData.id;
      }
      modal = null; editingGroupId = null;
      await saveData();
      render();
      renderModal();
      showToast(existingGroup ? 'Grupo actualizado.' : 'Grupo creado.');
    };
  }

  if(modal === 'groupSession'){
    const today = new Date().toISOString().slice(0,10);
    const existingSession = editingGroupSessionId ? state.groupSessions.find(s=>s.id===editingGroupSessionId) : null;
    overlay.innerHTML = `
      <div class="modal">
        <h3>${existingSession ? 'Continuar sesión grupal' : 'Registrar sesión grupal'}</h3>
        <div class="field"><label>Fecha</label><input type="date" id="gs-date" value="${existingSession ? existingSession.date : today}"></div>
        <div class="field"><label>Enfoque usado</label>
          <select id="gs-approach">
            <option value="directivo">Directivo</option>
            <option value="socratico">Socrático</option>
            <option value="colaborativo">Colaborativo</option>
          </select>
        </div>
        <div class="field"><label>Tema tratado</label><input id="gs-topic" placeholder="¿De qué trató la sesión?" value="${existingSession ? esc(existingSession.topic) : ''}"></div>
        <div class="field"><label>Qué funcionó</label><textarea id="gs-worked" placeholder="Opcional">${existingSession ? esc(existingSession.whatWorked) : ''}</textarea></div>
        <div class="field"><label>Qué ajustar la próxima vez</label><textarea id="gs-didnt" placeholder="Opcional">${existingSession ? esc(existingSession.whatDidnt) : ''}</textarea></div>
        <div class="field"><label>Próximos pasos</label><textarea id="gs-next" placeholder="Opcional">${existingSession ? esc(existingSession.nextSteps) : ''}</textarea></div>
        <div class="field"><label>Compromiso / acción pendiente <span style="color:var(--muted);">(opcional, marcable como cumplido después)</span></label><input id="gs-commitment" placeholder="Ej: cada integrante envía su CV" value="${existingSession ? esc(existingSession.commitment) : ''}"></div>
        <div class="modal-actions">
          <button class="btn-ghost" id="btn-cancel">Cancelar</button>
          <button class="btn-secondary" id="btn-draft">Guardar como borrador</button>
          <button class="btn-primary" id="btn-save">Guardar sesión</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    if(existingSession){
      overlay.querySelector('#gs-approach').value = existingSession.approach;
    }
    document.getElementById('btn-cancel').onclick = ()=>{ modal=null; editingGroupSessionId=null; renderModal(); };

    const collectGroupSession = (status)=>({
      id: existingSession ? existingSession.id : uid(),
      groupId: selectedGroupId,
      date: document.getElementById('gs-date').value || today,
      approach: document.getElementById('gs-approach').value,
      topic: document.getElementById('gs-topic').value.trim(),
      whatWorked: document.getElementById('gs-worked').value.trim(),
      whatDidnt: document.getElementById('gs-didnt').value.trim(),
      nextSteps: document.getElementById('gs-next').value.trim(),
      commitment: document.getElementById('gs-commitment').value.trim(),
      commitmentDone: existingSession ? !!existingSession.commitmentDone : false,
      status
    });

    document.getElementById('btn-draft').onclick = async ()=>{
      const sess = collectGroupSession('draft');
      if(existingSession){
        const idx = state.groupSessions.findIndex(s=>s.id===existingSession.id);
        state.groupSessions[idx] = sess;
      }else{
        state.groupSessions.push(sess);
      }
      modal = null; editingGroupSessionId = null;
      await saveData();
      render();
      renderModal();
      showToast('Guardado como borrador.');
    };

    document.getElementById('btn-save').onclick = async ()=>{
      const topic = document.getElementById('gs-topic').value.trim();
      if(!topic){ showToast('Describe el tema de la sesión.'); return; }
      const sess = collectGroupSession('final');
      if(existingSession){
        const idx = state.groupSessions.findIndex(s=>s.id===existingSession.id);
        state.groupSessions[idx] = sess;
      }else{
        state.groupSessions.push(sess);
      }
      modal = null; editingGroupSessionId = null;
      await saveData();
      render();
      renderModal();
      showToast('Sesión grupal registrada.');
    };
  }

  if(modal === 'mentee'){
    const existingMentee = editingMenteeId ? state.mentees.find(m=>m.id===editingMenteeId) : null;
    const v = (field)=> existingMentee ? esc(existingMentee[field] ?? '') : '';
    overlay.innerHTML = `
      <div class="modal">
        <h3>${existingMentee ? 'Editar mentee' : 'Nuevo mentee'}</h3>
        <div class="field"><label>Nombre</label><input id="f-name" placeholder="Nombre del mentee" value="${v('name')}"></div>
        <div class="field"><label>Área</label><input id="f-area" list="area-options" placeholder="Ej: búsqueda de primer empleo" value="${v('area')}"></div>
        <div class="field"><label>Nivel</label>
          <select id="f-level">
            <option value="Principiante">Principiante</option>
            <option value="Intermedio">Intermedio</option>
            <option value="Avanzado">Avanzado</option>
          </select>
        </div>
        <div class="field"><label>Tipo de mentoría</label>
          <select id="f-type">
            <option value="continuo">Seguimiento continuo</option>
            <option value="puntual">Consulta puntual (1-2 sesiones)</option>
          </select>
        </div>
        <div class="field"><label>Estado</label>
          <select id="f-status">
            <option value="activo">Activo</option>
            <option value="pausa">En pausa</option>
            <option value="cerrado">Cerrado</option>
          </select>
        </div>
        <div class="field"><label>Resultado final <span style="color:var(--muted);">(si está cerrado)</span></label>
          <select id="f-outcome">
            <option value="">Sin especificar</option>
            <option value="logrado">Objetivo logrado</option>
            <option value="parcial">Logrado parcialmente</option>
            <option value="no_logrado">No logrado</option>
          </select>
        </div>
        <div class="field"><label>Estilo de aprendizaje</label>
          <select id="f-style">
            <option value="Haciendo (práctico)">Haciendo (práctico)</option>
            <option value="Observando ejemplos">Observando ejemplos</option>
            <option value="Conversando ideas">Conversando ideas</option>
            <option value="Mixto">Mixto</option>
          </select>
        </div>
        <div class="field"><label>Objetivo principal</label><textarea id="f-goal" placeholder="¿Qué quiere lograr esta persona?">${v('goal')}</textarea></div>
        <div class="field"><label>Teléfono <span style="color:var(--muted);">(opcional)</span></label><input id="f-phone" type="tel" placeholder="Ej: 809-555-0123" value="${v('phone')}"></div>
        <div class="field"><label>Correo <span style="color:var(--muted);">(opcional)</span></label><input id="f-email" type="email" placeholder="nombre@correo.com" value="${v('email')}"></div>
        <div class="field"><label>País <span style="color:var(--muted);">(opcional)</span></label>
          <select id="f-country">
            <option value="">Sin especificar</option>
            ${COUNTRIES.map(c=>`<option value="${c}">${c}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Progresión <span style="color:var(--muted);">(opcional)</span></label><textarea id="f-progress" placeholder="Notas sobre cómo ha avanzado hasta ahora">${v('progress')}</textarea></div>
        <div class="modal-actions">
          <button class="btn-ghost" id="btn-cancel">Cancelar</button>
          <button class="btn-primary" id="btn-save">${existingMentee ? 'Guardar cambios' : 'Guardar mentee'}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    if(existingMentee){
      overlay.querySelector('#f-level').value = existingMentee.level;
      overlay.querySelector('#f-type').value = existingMentee.type || 'continuo';
      overlay.querySelector('#f-status').value = existingMentee.status || 'activo';
      overlay.querySelector('#f-outcome').value = existingMentee.outcome || '';
      overlay.querySelector('#f-style').value = existingMentee.learningStyle;
      overlay.querySelector('#f-country').value = existingMentee.country || '';
    }
    document.getElementById('btn-cancel').onclick = ()=>{ modal=null; editingMenteeId=null; renderModal(); };
    document.getElementById('btn-save').onclick = async ()=>{
      const name = document.getElementById('f-name').value.trim();
      if(!name){ showToast('Ponle un nombre al mentee.'); return; }
      const newStatus = document.getElementById('f-status').value;
      const menteeData = {
        id: existingMentee ? existingMentee.id : uid(),
        name,
        area: document.getElementById('f-area').value.trim() || 'Sin especificar',
        level: document.getElementById('f-level').value,
        type: document.getElementById('f-type').value,
        status: newStatus,
        outcome: document.getElementById('f-outcome').value,
        learningStyle: document.getElementById('f-style').value,
        goal: document.getElementById('f-goal').value.trim() || 'Sin especificar',
        phone: document.getElementById('f-phone').value.trim(),
        email: document.getElementById('f-email').value.trim(),
        country: document.getElementById('f-country').value,
        progress: document.getElementById('f-progress').value.trim(),
        closedAt: newStatus === 'cerrado' ? (existingMentee?.closedAt || new Date().toISOString()) : '',
        createdAt: existingMentee ? existingMentee.createdAt : new Date().toISOString()
      };
      if(existingMentee){
        const idx = state.mentees.findIndex(m=>m.id===existingMentee.id);
        state.mentees[idx] = menteeData;
      }else{
        state.mentees.push(menteeData);
        selectedMenteeId = menteeData.id;
      }
      modal = null; editingMenteeId = null;
      await saveData();
      render();
      renderModal();
      showToast(existingMentee ? 'Datos actualizados.' : 'Mentee agregado.');
    };
  }

  if(modal === 'template'){
    const existingTemplate = editingTemplateId ? state.templates.find(t=>t.id===editingTemplateId) : null;
    modalTemplateItems = existingTemplate
      ? existingTemplate.items.map(i=>({...i}))
      : [{id: uid(), type:'checkbox', text:''}];

    overlay.innerHTML = `
      <div class="modal" style="max-width:520px;">
        <h3>${existingTemplate ? 'Editar plantilla' : 'Nueva plantilla'}</h3>
        <div class="field"><label>Nombre de la plantilla</label><input id="tpl-name" placeholder="Ej: Checklist primera sesión" value="${existingTemplate ? esc(existingTemplate.name) : ''}"></div>
        <div class="field">
          <label>Preguntas / items</label>
          <div id="tpl-items-list"></div>
          <button type="button" class="btn-ghost" id="btn-add-item" style="margin-top:8px;">+ agregar item</button>
        </div>
        <div class="modal-actions">
          <button class="btn-ghost" id="btn-cancel">Cancelar</button>
          <button class="btn-primary" id="btn-save-template">Guardar plantilla</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('btn-cancel').onclick = ()=>{ modal=null; editingTemplateId=null; renderModal(); };

    function renderTplItemsList(){
      const wrap = document.getElementById('tpl-items-list');
      wrap.innerHTML = modalTemplateItems.map((item, i)=>`
        <div class="tpl-item-row" data-idx="${i}">
          <select class="tpl-item-type">
            <option value="checkbox" ${item.type==='checkbox'?'selected':''}>Casilla (sin respuesta)</option>
            <option value="question" ${item.type==='question'?'selected':''}>Pregunta con respuesta</option>
          </select>
          <input class="tpl-item-text" placeholder="Texto del item" value="${esc(item.text)}">
          <button type="button" class="tpl-item-remove" title="Quitar item">✕</button>
        </div>
      `).join('');
      wrap.querySelectorAll('.tpl-item-row').forEach(row=>{
        const i = +row.dataset.idx;
        row.querySelector('.tpl-item-type').onchange = (e)=>{ modalTemplateItems[i].type = e.target.value; };
        row.querySelector('.tpl-item-text').oninput = (e)=>{ modalTemplateItems[i].text = e.target.value; };
        row.querySelector('.tpl-item-remove').onclick = ()=>{
          modalTemplateItems.splice(i,1);
          if(!modalTemplateItems.length) modalTemplateItems.push({id: uid(), type:'checkbox', text:''});
          renderTplItemsList();
        };
      });
    }
    renderTplItemsList();

    document.getElementById('btn-add-item').onclick = ()=>{
      modalTemplateItems.push({id: uid(), type:'checkbox', text:''});
      renderTplItemsList();
    };

    document.getElementById('btn-save-template').onclick = async ()=>{
      const name = document.getElementById('tpl-name').value.trim();
      const items = modalTemplateItems.filter(i=>i.text.trim()).map(i=>({id:i.id, type:i.type, text:i.text.trim()}));
      if(!name){ showToast('Ponle un nombre a la plantilla.'); return; }
      if(!items.length){ showToast('Agrega al menos un item con texto.'); return; }
      if(existingTemplate){
        const idx = state.templates.findIndex(t=>t.id===existingTemplate.id);
        state.templates[idx] = { id: existingTemplate.id, name, items };
      }else{
        state.templates.push({ id: uid(), name, items });
      }
      modal = null; editingTemplateId = null;
      await saveData();
      render();
      showToast(existingTemplate ? 'Plantilla actualizada.' : 'Plantilla creada.');
    };
    return;
  }

  if(modal === 'session'){
    const today = new Date().toISOString().slice(0,10);
    const existingSession = editingSessionId ? state.sessions.find(s=>s.id===editingSessionId) : null;
    modalChecklist = existingSession && existingSession.checklist ? existingSession.checklist.map(i=>({...i})) : [];
    let sessionTemplateId = existingSession ? (existingSession.templateId || '') : '';

    overlay.innerHTML = `
      <div class="modal">
        <h3>${existingSession ? 'Continuar sesión' : 'Registrar sesión'}</h3>
        <div class="field"><label>Fecha</label><input type="date" id="s-date" value="${existingSession ? existingSession.date : today}"></div>
        <div class="field"><label>Enfoque usado</label>
          <select id="s-approach">
            <option value="directivo">Directivo</option>
            <option value="socratico">Socrático</option>
            <option value="colaborativo">Colaborativo</option>
          </select>
        </div>
        <div class="field"><label>Tema tratado</label><input id="s-topic" placeholder="¿De qué trató la sesión?" value="${existingSession ? esc(existingSession.topic) : ''}"></div>
        <div class="field"><label>Qué funcionó</label><textarea id="s-worked" placeholder="Opcional">${existingSession ? esc(existingSession.whatWorked) : ''}</textarea></div>
        <div class="field"><label>Qué ajustar la próxima vez</label><textarea id="s-didnt" placeholder="Opcional">${existingSession ? esc(existingSession.whatDidnt) : ''}</textarea></div>
        <div class="field"><label>Próximos pasos</label><textarea id="s-next" placeholder="Opcional">${existingSession ? esc(existingSession.nextSteps) : ''}</textarea></div>
        <div class="field"><label>Compromiso / acción pendiente <span style="color:var(--muted);">(opcional, marcable como cumplido después)</span></label><input id="s-commitment" placeholder="Ej: enviar CV actualizado" value="${existingSession ? esc(existingSession.commitment) : ''}"></div>
        <div class="field"><label>Plantilla de preguntas clave <span style="color:var(--muted);">(opcional)</span></label>
          <select id="s-template">
            <option value="">Sin plantilla</option>
            ${state.templates.map(t=>`<option value="${t.id}" ${sessionTemplateId===t.id?'selected':''}>${esc(t.name)}</option>`).join('')}
          </select>
          <div id="s-checklist"></div>
        </div>
        <div class="modal-actions">
          <button class="btn-ghost" id="btn-cancel">Cancelar</button>
          <button class="btn-secondary" id="btn-draft">Guardar como borrador</button>
          <button class="btn-primary" id="btn-save">Guardar sesión</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    if(existingSession){
      overlay.querySelector('#s-approach').value = existingSession.approach;
    }
    document.getElementById('btn-cancel').onclick = ()=>{ modal=null; editingSessionId=null; renderModal(); };

    function renderSessionChecklist(){
      const box = document.getElementById('s-checklist');
      if(!modalChecklist.length){ box.innerHTML = ''; return; }
      box.innerHTML = `<div class="checklist-box">
        ${modalChecklist.map((item, i)=> item.type === 'checkbox' ? `
          <div class="checklist-row">
            <input type="checkbox" data-idx="${i}" ${item.checked?'checked':''}>
            <span>${esc(item.text)}</span>
          </div>
        ` : `
          <div class="checklist-q">
            <label>${esc(item.text)}</label>
            <input data-idx="${i}" value="${esc(item.answer||'')}" placeholder="Respuesta">
          </div>
        `).join('')}
      </div>`;
      box.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
        cb.onchange = (e)=>{ modalChecklist[+cb.dataset.idx].checked = e.target.checked; };
      });
      box.querySelectorAll('.checklist-q input').forEach(inp=>{
        inp.oninput = (e)=>{ modalChecklist[+inp.dataset.idx].answer = e.target.value; };
      });
    }
    renderSessionChecklist();

    document.getElementById('s-template').onchange = (e)=>{
      sessionTemplateId = e.target.value;
      if(!sessionTemplateId){ modalChecklist = []; }
      else{
        const tpl = state.templates.find(t=>t.id===sessionTemplateId);
        modalChecklist = tpl ? tpl.items.map(i=>({itemId:i.id, type:i.type, text:i.text, checked:false, answer:''})) : [];
      }
      renderSessionChecklist();
    };

    const collectSession = (status)=>({
      id: existingSession ? existingSession.id : uid(),
      menteeId: selectedMenteeId,
      date: document.getElementById('s-date').value || today,
      approach: document.getElementById('s-approach').value,
      topic: document.getElementById('s-topic').value.trim(),
      whatWorked: document.getElementById('s-worked').value.trim(),
      whatDidnt: document.getElementById('s-didnt').value.trim(),
      nextSteps: document.getElementById('s-next').value.trim(),
      commitment: document.getElementById('s-commitment').value.trim(),
      commitmentDone: existingSession ? !!existingSession.commitmentDone : false,
      templateId: sessionTemplateId || null,
      checklist: modalChecklist,
      status
    });

    document.getElementById('btn-draft').onclick = async ()=>{
      const sess = collectSession('draft');
      if(existingSession){
        const idx = state.sessions.findIndex(s=>s.id===existingSession.id);
        state.sessions[idx] = sess;
      }else{
        state.sessions.push(sess);
      }
      modal = null; editingSessionId = null;
      await saveData();
      render();
      renderModal();
      showToast('Guardado como borrador.');
    };

    document.getElementById('btn-save').onclick = async ()=>{
      const topic = document.getElementById('s-topic').value.trim();
      if(!topic){ showToast('Describe el tema de la sesión.'); return; }
      const sess = collectSession('final');
      if(existingSession){
        const idx = state.sessions.findIndex(s=>s.id===existingSession.id);
        state.sessions[idx] = sess;
      }else{
        state.sessions.push(sess);
      }
      modal = null; editingSessionId = null;
      await saveData();
      render();
      renderModal();
      showToast('Sesión registrada.');
    };
  }
}

function deleteMentee(id){
  const mentee = state.mentees.find(m=>m.id===id);
  if(!mentee) return;
  askConfirm(`¿Eliminar a ${mentee.name} y todo su historial de sesiones? Podrás deshacerlo por unos segundos.`, ()=> performDeleteMentee(id));
}

async function performDeleteMentee(id){
  const mentee = state.mentees.find(m=>m.id===id);
  if(!mentee) return;
  const relatedSessions = state.sessions.filter(s=>s.menteeId===id);
  state.mentees = state.mentees.filter(m=>m.id!==id);
  state.sessions = state.sessions.filter(s=>s.menteeId!==id);
  if(selectedMenteeId === id) selectedMenteeId = state.mentees[0]?.id || null;
  await saveData();
  render();
  showUndoToast(`${mentee.name} eliminado.`, async ()=>{
    state.mentees.push(mentee);
    state.sessions.push(...relatedSessions);
    selectedMenteeId = mentee.id;
    await saveData();
    render();
  });
}

function deleteSession(id){
  askConfirm('¿Eliminar esta sesión? Podrás deshacerlo por unos segundos.', ()=> performDeleteSession(id));
}

async function performDeleteSession(id){
  const session = state.sessions.find(s=>s.id===id);
  if(!session) return;
  state.sessions = state.sessions.filter(s=>s.id!==id);
  await saveData();
  render();
  showUndoToast('Sesión eliminada.', async ()=>{
    state.sessions.push(session);
    await saveData();
    render();
  });
}

function exportBackup(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'bitacora-mentor-backup.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Copia de seguridad exportada.');
}

function importBackup(file){
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed || !Array.isArray(parsed.mentees) || !Array.isArray(parsed.sessions)){
        showToast('El archivo no tiene el formato esperado.');
        return;
      }
      state = parsed;
      if(!state.mentees) state.mentees = [];
      if(!state.sessions) state.sessions = [];
      if(!state.groups) state.groups = [];
      if(!state.groupSessions) state.groupSessions = [];
      if(!state.templates) state.templates = [];
      selectedMenteeId = state.mentees[0]?.id || null;
      selectedGroupId = state.groups[0]?.id || null;
      await saveData();
      render();
      showToast('Copia de seguridad importada.');
    }catch(err){
      showToast('No se pudo leer ese archivo JSON.');
    }
  };
  reader.readAsText(file);
}

function buildExportRows(){
  const rows = [];
  state.mentees.forEach(m=>{
    const sessions = state.sessions.filter(s=>s.menteeId===m.id).sort((a,b)=>a.date.localeCompare(b.date));
    const baseInfo = {
      TipoRegistro: 'Individual',
      Nombre: m.name, Area: m.area, Nivel: m.level,
      'Tipo de mentoria': m.type==='puntual' ? 'Consulta puntual' : 'Seguimiento continuo',
      Estado: ESTADOS[m.status||'activo'], Resultado: m.outcome ? (RESULTADOS[m.outcome]||'') : '',
      'Estilo de aprendizaje': m.learningStyle, Objetivo: m.goal,
      Telefono: m.phone || '', Correo: m.email || '', Pais: m.country || '', Progresion: m.progress || '',
      Integrantes: ''
    };
    if(!sessions.length){
      rows.push({ ...baseInfo, Fecha: '', Enfoque: '', EstadoSesion: '', Tema: '', 'Que funciono': '', 'Que ajustar': '', 'Proximos pasos': '', Compromiso: '', CompromisoCumplido: '' });
    }else{
      sessions.forEach(s=>{
        rows.push({
          ...baseInfo,
          Fecha: s.date, Enfoque: (ENFOQUES[s.approach]||{}).label || s.approach,
          EstadoSesion: s.status === 'draft' ? 'Borrador' : 'Final',
          Tema: s.topic, 'Que funciono': s.whatWorked, 'Que ajustar': s.whatDidnt, 'Proximos pasos': s.nextSteps,
          Compromiso: s.commitment || '', CompromisoCumplido: s.commitment ? (s.commitmentDone ? 'Sí' : 'No') : ''
        });
      });
    }
  });

  state.groups.forEach(g=>{
    const members = state.mentees.filter(m => (g.memberIds||[]).includes(m.id)).map(m=>m.name).join('; ');
    const gSessions = state.groupSessions.filter(s=>s.groupId===g.id).sort((a,b)=>a.date.localeCompare(b.date));
    const baseInfo = {
      TipoRegistro: 'Grupal',
      Nombre: g.name, Area: '', Nivel: '',
      'Tipo de mentoria': '', Estado: '', Resultado: '',
      'Estilo de aprendizaje': '', Objetivo: g.description || '',
      Telefono: '', Correo: '', Pais: '', Progresion: '',
      Integrantes: members
    };
    if(!gSessions.length){
      rows.push({ ...baseInfo, Fecha: '', Enfoque: '', EstadoSesion: '', Tema: '', 'Que funciono': '', 'Que ajustar': '', 'Proximos pasos': '', Compromiso: '', CompromisoCumplido: '' });
    }else{
      gSessions.forEach(s=>{
        rows.push({
          ...baseInfo,
          Fecha: s.date, Enfoque: (ENFOQUES[s.approach]||{}).label || s.approach,
          EstadoSesion: s.status === 'draft' ? 'Borrador' : 'Final',
          Tema: s.topic, 'Que funciono': s.whatWorked, 'Que ajustar': s.whatDidnt, 'Proximos pasos': s.nextSteps,
          Compromiso: s.commitment || '', CompromisoCumplido: s.commitment ? (s.commitmentDone ? 'Sí' : 'No') : ''
        });
      });
    }
  });

  return rows;
}

function exportCSV(){
  const rows = buildExportRows();
  if(!rows.length){ showToast('No hay datos para exportar todavia.'); return; }
  const headers = Object.keys(rows[0]);
  const csvEscape = (val)=>{
    const str = String(val ?? '');
    if(/[",\n]/.test(str)) return '"' + str.replace(/"/g,'""') + '"';
    return str;
  };
  const lines = [headers.join(',')];
  rows.forEach(r=> lines.push(headers.map(h=>csvEscape(r[h])).join(',')));
  const csvContent = '\ufeff' + lines.join('\n');
  const blob = new Blob([csvContent], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'bitacora-mentoria.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('CSV exportado.');
}

function exportExcel(){
  const rows = buildExportRows();
  if(!rows.length){ showToast('No hay datos para exportar todavia.'); return; }
  try{
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = Object.keys(rows[0]).map(()=>({wch:20}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Bitacora');
    XLSX.writeFile(wb, 'bitacora-mentoria.xlsx');
    showToast('Excel exportado.');
  }catch(e){
    showToast('No se pudo generar el Excel.');
  }
}

loadData();
