<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIPS-HUB</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 46 46'%3E%3Crect width='46' height='46' rx='6' fill='%23131B23'/%3E%3Crect x='1' y='1' width='44' height='44' rx='4' stroke='%23D8AE6E' stroke-width='1.5'/%3E%3Cpath d='M12 32V14L23 22L34 14V32' stroke='%23F1EDE4' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='23' cy='22' r='2' fill='%234E8B8B'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

  :root{
    --ink:#131B23;
    --ink-2:#1C2733;
    --parchment:#E7E1CF;
    --parchment-2:#EFEADC;
    --brass:#B8863B;
    --brass-light:#D8AE6E;
    --teal:#4E8B8B;
    --text-dark:#1B2430;
    --text-light:#F1EDE4;
    --text-muted:#8B94A3;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background:
      radial-gradient(ellipse at 20% 0%, #1a2530 0%, transparent 55%),
      radial-gradient(ellipse at 85% 100%, #17222c 0%, transparent 50%),
      var(--ink);
    min-height:100vh;
    min-height:100dvh;
    font-family:'Inter', sans-serif;
    color:var(--text-light);
    padding:56px 24px 80px;
    position:relative;
    overflow-x:hidden;
  }

  body::before{
    content:'';
    position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }

  header{
    max-width:1040px;
    margin:0 auto 52px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:16px;
    border-bottom:1px solid rgba(216,174,110,0.25);
    padding-bottom:28px;
  }

  .brand-mark{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
  }

  .brand-mark svg{ flex-shrink:0; width:clamp(36px, 8vw, 46px); height:clamp(36px, 8vw, 46px); }

  h1{
    font-family:'Zilla Slab', serif;
    font-weight:700;
    font-size:clamp(2.2rem, 5vw, 3.2rem);
    letter-spacing:0.01em;
    color:var(--text-light);
    line-height:1;
  }

  .brand-sub{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--brass-light);
    margin-top:6px;
  }

  .ledger-meta{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    color:var(--text-muted);
    text-align:right;
    line-height:1.8;
  }

  .ledger-meta span{ color:var(--teal); }

  main{
    max-width:1040px;
    margin:0 auto;
  }

  .index-label{
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .index-label::after{
    content:'';
    flex:1;
    height:1px;
    background:rgba(255,255,255,0.08);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:clamp(14px, 3vw, 22px);
  }

  .card{
    position:relative;
    background:var(--parchment);
    border-radius:3px;
    padding:22px 20px 20px;
    color:var(--text-dark);
    text-decoration:none;
    display:flex;
    flex-direction:column;
    gap:14px;
    min-height:190px;
    box-shadow:0 1px 0 rgba(255,255,255,0.4) inset, 0 14px 30px -12px rgba(0,0,0,0.55);
    transition:transform 0.22s cubic-bezier(.2,.8,.2,1), box-shadow 0.22s ease;
    overflow:hidden;
    border-top:3px solid var(--tab-color, var(--brass));
    -webkit-tap-highlight-color:transparent;
  }

  .card:active{ transform:translateY(-2px) scale(0.99); }

  .card::before{
    content:'';
    position:absolute;
    left:0; top:0; bottom:0;
    width:26px;
    background-image:repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 10px,
      rgba(27,36,48,0.14) 10px, rgba(27,36,48,0.14) 11px
    );
    opacity:0.55;
  }

  .card:hover{
    transform:translateY(-5px);
    box-shadow:0 1px 0 rgba(255,255,255,0.4) inset, 0 22px 40px -14px rgba(0,0,0,0.65);
  }

  .card:focus-visible{
    outline:2px solid var(--teal);
    outline-offset:3px;
  }

  .card-icon{
    width:44px; height:44px;
    display:flex; align-items:center; justify-content:center;
    margin-left:14px;
  }

  .card-body{ margin-left:14px; }

  .card-tag{
    font-family:'JetBrains Mono', monospace;
    font-size:0.62rem;
    letter-spacing:0.13em;
    text-transform:uppercase;
    color:var(--tab-color, var(--brass));
    font-weight:500;
    margin-bottom:6px;
    display:block;
  }

  .card-title{
    font-family:'Zilla Slab', serif;
    font-weight:600;
    font-size:1.28rem;
    line-height:1.2;
    margin-bottom:8px;
  }

  .card-desc{
    font-size:0.86rem;
    line-height:1.45;
    color:#3E4757;
  }

  .card-open{
    margin-top:auto;
    margin-left:14px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dark);
    display:flex; align-items:center; gap:6px;
    opacity:0.65;
  }

  .card-open svg{ transition:transform 0.2s ease; }
  .card:hover .card-open svg{ transform:translateX(3px); }

  footer{
    max-width:1040px;
    margin:60px auto 0;
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    color:var(--text-muted);
    border-top:1px solid rgba(255,255,255,0.08);
    padding-top:18px;
  }

  @media (max-width:900px){
    body{ padding:44px 20px 64px; }
    .grid{ grid-template-columns:repeat(auto-fill, minmax(190px, 1fr)); }
  }

  @media (max-width:640px){
    body{ padding:36px 16px 56px; }
    header{ align-items:flex-start; gap:12px; margin-bottom:36px; padding-bottom:22px; }
    .ledger-meta{ text-align:left; font-size:0.68rem; }
    .index-label{ margin-bottom:16px; }
    .grid{ grid-template-columns:1fr 1fr; gap:14px; }
    .card{ min-height:170px; padding:18px 16px 16px; }
    .card-icon{ width:36px; height:36px; margin-left:10px; }
    .card-body{ margin-left:10px; }
    .card-title{ font-size:1.1rem; }
    .card-desc{ font-size:0.8rem; }
    .card-open{ margin-left:10px; }
  }

  @media (max-width:420px){
    .grid{ grid-template-columns:1fr; }
    .card{ min-height:auto; }
  }

  @media (hover:none){
    .card:hover{ transform:none; box-shadow:0 1px 0 rgba(255,255,255,0.4) inset, 0 14px 30px -12px rgba(0,0,0,0.55); }
  }
</style>
</head>
<body>

<header>
  <div class="brand-mark">
    <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
      <rect x="1" y="1" width="44" height="44" rx="4" stroke="#D8AE6E" stroke-width="1.5"/>
      <path d="M12 32V14L23 22L34 14V32" stroke="#F1EDE4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="23" cy="22" r="2" fill="#4E8B8B"/>
    </svg>
    <div>
      <h1>LIPS-HUB</h1>
      <div class="brand-sub">Panel de control &mdash; herramientas personales</div>
    </div>
  </div>
  <div class="ledger-meta">
    ENTRADAS: <span id="count">5</span><br>
    ESTADO: <span>activo</span><br>
    <a href="#" id="logout-link" style="color:var(--teal); text-decoration:none;">Cerrar sesión</a>
  </div>
</header>

<main>
  <div class="index-label">Índice de aplicaciones</div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  LIPS-HUB · edita la ruta de cada ficha en APPS dentro del código para conectar tu index.html
</footer>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="./supabase-client.js"></script>
<script src="./auth-gate.js"></script>
<script>
  document.getElementById('logout-link').addEventListener('click', function(e){
    e.preventDefault();
    if (window.aiAppsSignOut) window.aiAppsSignOut();
  });

  // Edita "href" con la ruta real de cada index.html cuando la tengas lista.
  const APPS = [
    {
      tag: "Planificación",
      title: "Timeline Loader",
      desc: "Elaboración y seguimiento de cronogramas de proyecto.",
      href: "./generador_gantt_2.html",
      color: "#B8863B",
      icon: `<svg width="30" height="30" viewBox="0 0 30 30" fill="none"><rect x="3" y="5" width="24" height="22" rx="2" stroke="#1B2430" stroke-width="1.6"/><path d="M3 11H27" stroke="#1B2430" stroke-width="1.6"/><path d="M9 3V7" stroke="#1B2430" stroke-width="1.6" stroke-linecap="round"/><path d="M21 3V7" stroke="#1B2430" stroke-width="1.6" stroke-linecap="round"/><rect x="7" y="15" width="6" height="3" fill="#B8863B"/><rect x="15" y="15" width="8" height="3" fill="#B8863B" opacity="0.5"/><rect x="7" y="21" width="10" height="3" fill="#B8863B" opacity="0.5"/></svg>`
    },
    {
      tag: "Mentorías",
      title: "Bitácora del Mentor",
      desc: "Registro de sesiones y seguimiento de mentorías.",
      href: "./bitacora-mentor.html",
      color: "#4E8B8B",
      icon: `<svg width="30" height="30" viewBox="0 0 30 30" fill="none"><path d="M6 4H21C22.6569 4 24 5.34315 24 7V26L20 23L16 26L12 23L8 26L6 24V4Z" stroke="#1B2430" stroke-width="1.6" stroke-linejoin="round"/><path d="M10 10H20" stroke="#4E8B8B" stroke-width="1.6" stroke-linecap="round"/><path d="M10 14.5H17" stroke="#4E8B8B" stroke-width="1.6" stroke-linecap="round"/></svg>`
    },
    {
      tag: "Evaluación",
      title: "Entrevistas Técnicas",
      desc: "Guías de entrevista y evaluación teórica de candidatos.",
      href: "./StaffGate.html",
      color: "#8C6BAE",
      icon: `<svg width="30" height="30" viewBox="0 0 30 30" fill="none"><rect x="6" y="4" width="18" height="24" rx="2" stroke="#1B2430" stroke-width="1.6"/><rect x="11" y="2.5" width="8" height="4" rx="1" fill="#8C6BAE"/><path d="M10 14L13 17L20 10" stroke="#4E8B8B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 22H20" stroke="#1B2430" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/></svg>`
    },
    {
      tag: "Finanzas",
      title: "Presupuesto Personal",
      desc: "Control de ingresos, gastos y metas de ahorro.",
      href: "./lpbag.html",
      color: "#B85C4E",
      icon: `<svg width="30" height="30" viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="11" stroke="#1B2430" stroke-width="1.6"/><path d="M15 9V21" stroke="#B85C4E" stroke-width="1.6" stroke-linecap="round"/><path d="M18.5 11.5C18.5 10.1 16.9 9.5 15 9.5C13.1 9.5 11.5 10.2 11.5 11.6C11.5 14.5 18.5 13 18.5 16C18.5 17.4 16.9 18.2 15 18.2C13.1 18.2 11.5 17.5 11.5 16.1" stroke="#B85C4E" stroke-width="1.6" stroke-linecap="round"/></svg>`
    },
    {
      tag: "Viajes",
      title: "Tracking de Viajes",
      desc: "Planificación, itinerarios y seguimiento de viajes.",
      href: "./mytravel-pro-v4.html",
      color: "#4E7A8B",
      icon: `<svg width="30" height="30" viewBox="0 0 30 30" fill="none"><path d="M15 27C15 27 23 19.4 23 12.5C23 7.8 19.4 4 15 4C10.6 4 7 7.8 7 12.5C7 19.4 15 27 15 27Z" stroke="#1B2430" stroke-width="1.6" stroke-linejoin="round"/><circle cx="15" cy="12.5" r="3.5" fill="#4E7A8B"/></svg>`
    }
  ];

  const grid = document.getElementById('grid');
  document.getElementById('count').textContent = APPS.length;

  APPS.forEach((app, i) => {
    const card = document.createElement('a');
    card.href = app.href;
    card.className = 'card';
    card.style.setProperty('--tab-color', app.color);
    card.setAttribute('aria-label', 'Abrir ' + app.title);
    card.innerHTML = `
      <div class="card-icon">${app.icon}</div>
      <div class="card-body">
        <span class="card-tag">${app.tag}</span>
        <div class="card-title">${app.title}</div>
        <div class="card-desc">${app.desc}</div>
      </div>
      <div class="card-open">
        Abrir
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2V8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    `;
    grid.appendChild(card);
  });
</script>

</body>
</html>
